# cloudbuild.yaml — one-shot build + deploy of the MITRA API to Cloud Run
# Trigger this with: gcloud builds submit --config cloudbuild.yaml

substitutions:
  _REGION: 'asia-south1'
  _SERVICE: 'mitra-api'
  _AR_REPO: 'mitra'
  _STORAGE_BUCKET: 'watchaugs-mitra-storage'
  _APP_BASE_URL: 'https://watchaugs-mitra.web.app'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'

steps:
  # 1. Build the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - '.'

  # 2. Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=mitra-api@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--timeout=300'
      - '--set-env-vars=^##^NODE_ENV=production##GCP_PROJECT_ID=$PROJECT_ID##STORAGE_BUCKET=${_STORAGE_BUCKET}##APP_BASE_URL=${_APP_BASE_URL}##ALLOWED_ORIGINS=https://watchaugs-mitra.web.app,http://localhost:3000,http://localhost:3001'
      - '--set-secrets=JWT_SECRET=jwt-secret:latest,JWT_REFRESH_SECRET=jwt-refresh-secret:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

timeout: '1200s'