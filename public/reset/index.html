<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MITRA - Set New Password</title>
  <style>
    /* Styling to match your dark dashboard theme */
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap');
    body { background: #07090f; color: white; font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-box { background: #111; padding: 40px 30px; border-radius: 8px; width: 100%; max-width: 340px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
    .login-logo { font-size: 28px; font-weight: bold; font-family: 'Syne', sans-serif; margin-bottom: 5px; letter-spacing: 1px; }
    .login-sub { font-size: 13px; color: #888; margin-bottom: 25px; }
    .inp { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-family: inherit; }
    .inp:focus { outline: none; border-color: #2563eb; }
    .btn-p { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
    .btn-p:hover { background: #1d4ed8; }
    #message { font-size: 13px; margin-top: 15px; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">MITRA</div>
    <div class="login-sub">Secure Password Setup</div>

    <input class="inp" id="new-password" type="password" placeholder="New Password (min 12 chars)">
    <input class="inp" id="confirm-password" type="password" placeholder="Confirm Password">

    <button class="btn btn-p" onclick="submitNewPassword()">Save Password →</button>
    <div id="message"></div>
  </div>

  <script>
    async function submitNewPassword() {
      // 1. Grab the secure token from the URL bar
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const msg = document.getElementById('message');

      if (!token) {
        msg.style.color = '#ff4444';
        msg.textContent = 'Error: Invalid or missing reset token.';
        return;
      }

      // 2. Grab the passwords the user typed
      const p1 = document.getElementById('new-password').value;
      const p2 = document.getElementById('confirm-password').value;

      // 3. Basic Security Checks
      if (p1 !== p2) {
        msg.style.color = '#ff4444';
        msg.textContent = 'Passwords do not match.';
        return;
      }
      if (p1.length < 12) {
        msg.style.color = '#ff4444';
        msg.textContent = 'Password must be at least 12 characters (CERT-In rule).';
        return;
      }

      msg.style.color = '#888';
      msg.textContent = 'Saving to database...';

      // 4. Send the Token and New Password to your backend
      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, newPassword: p1 })
        });

        const result = await response.json();

        if (response.ok) {
          msg.style.color = '#4ade80';
          msg.textContent = 'Success! Redirecting to login...';
          setTimeout(() => {
            window.location.href = '/'; // Send them back to the main dashboard
          }, 2000);
        } else {
          msg.style.color = '#ff4444';
          msg.textContent = result.error || 'Failed to save password.';
        }
      } catch (err) {
        msg.style.color = '#ff4444';
        msg.textContent = 'Network error. Try again later.';
      }
    }
  </script>
</body>
</html>
